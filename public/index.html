<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MP3 Maker</title>
  <link rel="stylesheet" href="styles.css">
  <script src="config.js"></script>
  <script src="background.js" defer></script>
  <script src="downloader.js" defer></script>
  <script src="admin.js" defer></script>
</head>
<body>
  <button class="admin-btn" id="adminBtn">⚙</button>

  <div class="modal-overlay" id="adminModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Server Console</div>
        <button class="modal-close" id="closeModal">&times;</button>
      </div>

      <div class="modal-content-logs">
        <div class="admin-health-panel">
          <div class="admin-health-title">System Status</div>
          <div class="admin-health-display" id="adminHealthDisplay">
            <div class="health-item">Loading...</div>
          </div>
        </div>

        <div class="logs-header">
          <div class="logs-title">Real-time Server Logs</div>
          <button class="clear-logs-btn" id="clearLogs">Clear</button>
        </div>
        <div class="logs-container" id="logsContainer">
          <div class="log-line">Connecting to log stream...</div>
        </div>
      </div>
    </div>
  </div>

  <div class="container">
    <input type="text" id="url" placeholder="Paste SoundCloud or Bandcamp URL">
    <button id="download">Convert</button>

    <div class="progress-container" id="progressContainer">
      <div class="status-text" id="statusText">Initializing...</div>
      <div class="progress-bar-wrapper">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="progress-details">
        <span id="progressPercent">0%</span>
        <span id="progressSpeed"></span>
        <span id="progressEta"></span>
      </div>
    </div>

    <div id="status" class="status"></div>

    <div class="thumbnail-container" id="thumbnailContainer">
      <img id="thumbnailImage" src="" alt="Video thumbnail">
      <div class="thumbnail-title" id="thumbnailTitle"></div>
    </div>

    <button id="downloadReady" style="display: none; margin-top: 20px; background: #51cf66;">Download MP3</button>
  </div>
</body>
</html>
